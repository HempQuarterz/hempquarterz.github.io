[build]
  base = "frontend"
  command = "npm run build"
  publish = "build"

[build.environment]
  # Environment variables should be set in Netlify dashboard UI
  # Site settings > Environment variables
  # Required variables:
  #   - REACT_APP_BIBLE_API_KEY
  #   - REACT_APP_SUPABASE_URL
  #   - REACT_APP_SUPABASE_ANON_KEY (public by design, protected by RLS)
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  CI = "false"

  # Skip secrets scanning for these keys (Supabase anon key is public by design)
  SECRETS_SCAN_OMIT_KEYS = "REACT_APP_BIBLE_API_KEY,REACT_APP_SUPABASE_ANON_KEY,REACT_APP_SUPABASE_URL"

# 301 redirect legacy domain to primary for SEO consolidation.
# Catches all variants (apex + www, http + https). Belt-and-suspenders
# even if Netlify's "primary domain" setting also handles this — survives
# moving off Netlify since it lives in the repo.
[[redirects]]
  from = "https://himquarterz.com/*"
  to = "https://all4yah.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.himquarterz.com/*"
  to = "https://all4yah.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://himquarterz.com/*"
  to = "https://all4yah.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.himquarterz.com/*"
  to = "https://all4yah.com/:splat"
  status = 301
  force = true

# SPA catch-all (must come last — Netlify processes redirects in order)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Lighthouse CI — runs after each deploy; reports go to deploy summary.
# Thresholds protect a11y/perf floor without failing the build.
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [plugins.inputs.thresholds]
    performance = 0.7
    accessibility = 0.95
    best-practices = 0.85
    seo = 0.9
    pwa = 0.5
